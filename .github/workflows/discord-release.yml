name: Discord Public Release Notifications

'on':
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  notify-public-release:
    name: Notify Public Release Discord Webhook
    runs-on: ubuntu-latest

    steps:
      - name: Validate Discord webhook secret
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_PUBLIC_RELEASE_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Missing repository secret: DISCORD_PUBLIC_RELEASE_WEBHOOK_URL"
            exit 1
          fi

      - name: Build Discord payload
        env:
          REPO_NAME: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          python - <<'PY'
          import json
          import os

          repo_name = os.environ.get("REPO_NAME", "Unknown repository")
          event_name = os.environ.get("EVENT_NAME", "Unknown event")
          ref_name = os.environ.get("REF_NAME", "Unknown ref")
          actor = os.environ.get("ACTOR", "Unknown actor")
          run_url = os.environ.get("RUN_URL", "Unavailable")
          server_url = os.environ.get("SERVER_URL", "https://github.com")

          release_name = os.environ.get("RELEASE_NAME") or "Manual Public Release Workflow Test"
          release_tag = os.environ.get("RELEASE_TAG") or ref_name or "manual-test"
          release_url = os.environ.get("RELEASE_URL") or run_url
          release_body = os.environ.get("RELEASE_BODY") or "Manual public release notification workflow test."

          # Discord field values have practical size limits, so keep the release notes short.
          release_summary = release_body.strip()
          if len(release_summary) > 900:
              release_summary = release_summary[:897] + "..."

          if event_name == "workflow_dispatch":
              title = "Manual Public Release Workflow Test"
              description = "The public Bravo Fires FDC Discord release workflow was manually triggered."
              color = 3447003
          elif event_name == "release":
              title = "Bravo Fires FDC Release Published"
              description = "A public Bravo Fires FDC release was published."
              color = 5763719
          else:
              title = "Bravo Fires FDC Public Update"
              description = "A public Bravo Fires FDC repository event was triggered."
              color = 3447003

          payload = {
              "username": "Bravo Fires Release Updates",
              "embeds": [
                  {
                      "title": title,
                      "description": description,
                      "color": color,
                      "fields": [
                          {
                              "name": "Repository",
                              "value": repo_name,
                              "inline": False
                          },
                          {
                              "name": "Release",
                              "value": release_name,
                              "inline": False
                          },
                          {
                              "name": "Tag",
                              "value": release_tag,
                              "inline": True
                          },
                          {
                              "name": "Triggered by",
                              "value": actor,
                              "inline": True
                          },
                          {
                              "name": "Release Notes",
                              "value": release_summary,
                              "inline": False
                          },
                          {
                              "name": "Release Page",
                              "value": f"[Open release]({release_url})",
                              "inline": False
                          },
                          {
                              "name": "Workflow Run",
                              "value": f"[Open workflow run]({run_url})",
                              "inline": False
                          }
                      ],
                      "footer": {
                          "text": "Bravo Fires FDC Public Release Channel"
                      }
                  }
              ]
          }

          with open("discord_payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PY

      - name: Send Discord notification
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_PUBLIC_RELEASE_WEBHOOK_URL }}
        run: |
          curl --fail-with-body \
            -H "Content-Type: application/json" \
            -X POST \
            --data @discord_payload.json \
            "$WEBHOOK_URL"